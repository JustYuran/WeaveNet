<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeaveNet - Mesh Network Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Верхняя панель: ресурсы и время -->
  <div id="ui-top">
    <div id="resources-panel">
      <div class="resource">
        <span class="resource-icon">📡</span>
        <span class="resource-value" id="influence">0</span>
        <span class="resource-income" id="influence-income">+0.0/сек</span>
      </div>
      <div class="resource">
        <span class="resource-icon">💾</span>
        <span class="resource-value" id="data">0</span>
        <span class="resource-income" id="data-income">+0.0/сек</span>
      </div>
    </div>
    
    <div id="time-controls">
      <button id="btn-pause" title="Пауза">⏸</button>
      <button id="btn-speed1" class="active" title="1x скорость">1x</button>
      <button id="btn-speed2" title="2x скорость">2x</button>
      <button id="btn-speed5" title="5x скорость">5x</button>
    </div>
    
    <div id="game-time">
      <span id="timer">00:00</span>
    </div>
  </div>

  <!-- Левая панель: узлы -->
  <div id="ui-left">
    <h3>📍 Узлы</h3>
    
    <div class="node-category">
      <h4>🔧 Игровые узлы</h4>
      <button class="add-node-btn" data-type="relay" 
              title="Ретранслятор: Радиус 150px, зеленый #00ff64, круг 10px, -10 ед/сек">
        📶 Ретранслятор (30 инф, 20 дан)
      </button>
      <button class="add-node-btn" data-type="server"
              title="Сервер: Радиус 200px, красный #ff0064, квадрат 24x24px, -25 ед/сек">
        🖥️ Сервер (50 инф, 40 дан)
      </button>
      <button class="add-node-btn" data-type="stealth"
              title="Скрытый ретранслятор: Радиус 100px, фиолетовый #9600ff, треугольник 18px, -15 ед/сек, невидим для глушилок">
        👻 Скрытый (40 инф, 30 дан)
      </button>
    </div>
    
    <div class="node-category">
      <h4>🌐 Сетевые объекты</h4>
      <button class="add-node-btn user-node" data-type="basic"
              title="Базовый узел (телефон). Дешевый, малый радиус. +0.5 инф/сек, +0.2 дан/сек.">
        📱 Базовый (10 инф)
      </button>
    </div>
    
    <div id="selected-node-info" class="hidden">
      <h4>Выбранный узел</h4>
      <div id="node-details"></div>
      <button id="btn-remove-node" class="danger">🗑 Удалить узел</button>
    </div>
  </div>

  <!-- Правая панель: статистика и цели -->
  <div id="ui-right">
    <h3>📊 Статистика</h3>
    
    <div class="stat-item">
      <span>Узлов:</span>
      <span id="stat-nodes">0</span>
    </div>
    <div class="stat-item">
      <span>Соединений:</span>
      <span id="stat-edges">0</span>
    </div>
    
    <h4>🎯 Цели миссии</h4>
    
    <div class="objective">
      <div class="objective-header">
        <span>Покрытие</span>
        <span id="obj-coverage-current">0%</span>
      </div>
      <div class="progress-bar">
        <div id="obj-coverage-bar" class="progress-fill"></div>
      </div>
      <div class="objective-target">Цель: <span id="obj-coverage-target">0%</span></div>
    </div>
    
    <div class="objective">
      <div class="objective-header">
        <span>Задержка</span>
        <span id="obj-latency-current">0ms</span>
      </div>
      <div class="progress-bar inverse">
        <div id="obj-latency-bar" class="progress-fill"></div>
      </div>
      <div class="objective-target">Макс: <span id="obj-latency-target">0ms</span></div>
    </div>
    
    <div class="objective">
      <div class="objective-header">
        <span>Стабильность</span>
        <span id="obj-stability-current">0%</span>
      </div>
      <div class="progress-bar">
        <div id="obj-stability-bar" class="progress-fill"></div>
      </div>
      <div class="objective-target">Мин: <span id="obj-stability-target">0%</span></div>
    </div>
    
    <div class="objective">
      <div class="objective-header">
        <span>Количество узлов</span>
        <span id="obj-nodes-current">0</span>
      </div>
      <div class="progress-bar">
        <div id="obj-nodes-bar" class="progress-fill"></div>
      </div>
      <div class="objective-target">Нужно: <span id="obj-nodes-target">0</span></div>
    </div>
    
    <div id="mission-info">
      <h4>ℹ️ Миссия</h4>
      <p id="mission-name"></p>
      <p id="mission-desc"></p>
    </div>
  </div>

  <!-- Canvas игры -->
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <!-- Нижняя панель: управление -->
  <div id="ui-bottom">
    <button id="btn-save">💾 Сохранить</button>
    <button id="btn-load">📂 Загрузить</button>
    <button id="btn-reset" class="danger">🔄 Сброс</button>
    
    <div id="view-controls">
      <button id="btn-view-default" class="active">Обычный</button>
      <button id="btn-view-coverage">Покрытие</button>
      <button id="btn-view-load">Нагрузка</button>
    </div>
  </div>

  <!-- Модальное окно обучения -->
  <div id="modal-tutorial" class="modal hidden">
    <div class="modal-content">
      <h2>🎮 Добро пожаловать в WeaveNet!</h2>
      <div id="tutorial-text"></div>
      <button id="btn-start-game" class="primary">Начать игру</button>
    </div>
  </div>

  <!-- Модальное окно победы/поражения -->
  <div id="modal-result" class="modal hidden">
    <div class="modal-content">
      <h2 id="result-title"></h2>
      <div id="result-stats"></div>
      <button id="btn-continue" class="primary">Продолжить</button>
      <button id="btn-restart">Заново</button>
    </div>
  </div>

  <!-- Тултип -->
  <div id="tooltip" class="tooltip hidden"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
