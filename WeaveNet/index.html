<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeaveNet - Свободный Сигнал</title>
    <!-- Заглушка favicon через data URI, чтобы избежать запроса файла и ошибки 404 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📡</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            color: white;
        }
        
        .resource-group {
            display: flex;
            gap: 30px;
        }
        
        .resource {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .resource-value {
            font-size: 28px;
            font-weight: bold;
        }
        
        .resource-label {
            font-size: 13px;
            opacity: 0.7;
        }
        
        .info-positive { color: #4ade80; }
        .info-negative { color: #f87171; }
        
        .controls-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .speed-btn {
            padding: 5px 10px;
            background: #333;
            border: 1px solid #555;
            color: white;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }
        
        .speed-btn:hover, .speed-btn.active {
            background: #4a9eff;
            border-color: #4a9eff;
        }
        
        #timer {
            font-family: monospace;
            font-size: 18px;
            min-width: 80px;
            text-align: center;
        }
        
        #canvas-container {
            width: 100%;
            height: calc(100% - 60px);
            overflow: hidden;
        }
        
        canvas {
            display: block;
        }
        
        #bottom-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #4a9eff;
            padding: 10px 20px;
            z-index: 100;
            color: white;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        #hex-info {
            flex: 1;
            display: flex;
            flex-direction: row;
            gap: 15px;
            align-items: center;
            font-size: 13px;
        }
        
        .hex-info-title {
            font-size: 14px;
            font-weight: bold;
            color: #4a9eff;
            white-space: nowrap;
            margin-right: 10px;
        }
        
        .hex-info-row {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            white-space: nowrap;
        }
        
        .hex-info-label {
            color: #aaa;
            white-space: nowrap;
        }
        
        .hex-info-value {
            color: #fff;
            font-weight: 500;
            min-width: 30px;
        }
        
        #hex-actions {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            align-items: center;
            min-width: 150px;
        }
        
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #4a9eff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a8eef;
        }
        
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        
        .btn-danger:hover {
            background: #b91c1c;
        }
        
        .btn-disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        
        #no-selection-message {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #888;
            font-style: italic;
        }
        
        .hidden {
            display: none !important;
        }
        
        #context-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #4a9eff;
            border-radius: 8px;
            padding: 15px;
            color: white;
            display: none;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
        }
        
        #context-panel.visible {
            display: block;
        }
        
        .panel-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        
        .panel-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            gap: 10px;
        }
        
        .panel-row span:first-child {
            flex-shrink: 0;
            min-width: 100px;
        }
        
        .panel-row span:last-child {
            text-align: right;
            word-break: break-word;
            flex-shrink: 1;
        }
        
        .panel-buttons {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .panel-btn {
            flex: 1 1 auto;
            min-width: 100px;
            padding: 10px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .btn-mode { background: #4a9eff; color: white; }
        .btn-mode:hover { background: #3a8eef; }
        
        .btn-demolish { background: #dc2626; color: white; font-weight: bold; }
        .btn-demolish:hover { background: #b91c1c; }
        
        .btn-close { 
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            border-radius: 4px;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 101;
            flex-shrink: 0;
        }
        .btn-close:hover { background: rgba(255, 255, 255, 0.4); }
        
        /* [ЧТО] Улучшенные стили для tooltip с автоматическим позиционированием снизу для элементов вверху экрана. */
        /* [ЗАЧЕМ] Предотвращает выход подсказок за пределы экрана, размещая их под элементами в верхней панели. */
        /* [ERROR] Ошибка 1 - наложение интерфейса (всплывающие окна показываются сверху за пределами окна браузера) -> ИСПРАВЛЕНО */
        .tooltip {
            position: relative;
            display: inline-block;
        }
        
        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            left: 50%;
            top: 100%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.98);
            color: white;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.4;
            max-width: min(280px, calc(100vw - 20px));
            width: max-content;
            white-space: normal;
            word-wrap: break-word;
            overflow-wrap: break-word;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 10000;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.7);
            border: 1px solid #4a9eff;
            text-align: center;
            pointer-events: none;
            margin-top: 8px;
        }
        
        .tooltip:hover::after {
            opacity: 1;
            visibility: visible;
            top: 100%;
        }
        
        /* Стрелочка для tooltip (направлена вверх к элементу) */
        .tooltip::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 100%;
            transform: translateX(-50%);
            border: 7px solid transparent;
            border-bottom-color: #4a9eff;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 10000;
            pointer-events: none;
            margin-top: 1px;
        }
        
        .tooltip:hover::before {
            opacity: 1;
            visibility: visible;
            top: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Верхняя панель -->
        <div id="top-bar">
            <div class="resource-group">
                <div class="resource tooltip" data-tooltip="Основная валюта для строительства">
                    <span class="resource-value" id="info-value">100</span>
                    <span class="resource-label">Информация</span>
                    <span class="resource-label" id="info-rate">+0/с</span>
                </div>
                <div class="resource tooltip" data-tooltip="Ресурс для обслуживания строений">
                    <span class="resource-value" id="energy-value">50</span>
                    <span class="resource-label">Энергия</span>
                    <span class="resource-label" id="energy-rate">+0/с</span>
                </div>
            </div>
            
            <div id="timer" class="tooltip" data-tooltip="Время игры в свободном режиме">00:00</div>
            
            <div class="controls-group">
                <button class="speed-btn tooltip" data-speed="0" data-tooltip="Пауза">⏸</button>
                <button class="speed-btn active tooltip" data-speed="1" data-tooltip="Обычная скорость (1x)">1x</button>
                <button class="speed-btn tooltip" data-speed="2" data-tooltip="Ускоренная скорость (2x)">2x</button>
                <button class="speed-btn tooltip" data-speed="5" data-tooltip="Быстрая скорость (5x)">5x</button>
                <button class="speed-btn tooltip" id="reset-btn" data-tooltip="Сбросить весь прогресс игры" style="background: #dc2626; border-color: #dc2626;">🗑️ Сброс</button>
            </div>
        </div>
        
        <!-- Канвас для рендеринга -->
        <div id="canvas-container">
            <canvas id="game-canvas"></canvas>
        </div>
        
        <!-- Нижняя панель с информацией о гексе -->
        <div id="bottom-panel">
            <div id="no-selection-message">
                Выберите гекс на карте, чтобы увидеть информацию
            </div>
            <div id="hex-info" class="hidden">
                <div class="hex-info-title" id="hex-title">Гекс #0</div>
                <div class="hex-info-row">
                    <span class="hex-info-label">Координаты:</span>
                    <span class="hex-info-value" id="hex-coords">(0, 0)</span>
                </div>
                <div class="hex-info-row">
                    <span class="hex-info-label">Тип местности:</span>
                    <span class="hex-info-value" id="hex-terrain">Равнина</span>
                </div>
                <div class="hex-info-row">
                    <span class="hex-info-label">Постройка:</span>
                    <span class="hex-info-value" id="hex-building">Нет</span>
                </div>
                <div class="hex-info-row">
                    <span class="hex-info-label">Пользователей:</span>
                    <span class="hex-info-value" id="hex-users">0</span>
                </div>
                <div class="hex-info-row">
                    <span class="hex-info-label">Соседей:</span>
                    <span class="hex-info-value" id="hex-neighbors">0</span>
                </div>
            </div>
            <div id="hex-actions" class="hidden">
                <button class="action-btn btn-danger hidden" id="btn-demolish">Снести постройку</button>
            </div>
        </div>
        
        <!-- Контекстная панель (удалена - теперь панель построек сверху) -->
        <!-- <div id="context-panel">
            <button class="btn-close tooltip" onclick="closeContextPanel()" data-tooltip="Закрыть панель">×</button>
            <div class="panel-title" id="panel-title">Объект</div>
            <div id="panel-content"></div>
            <div class="panel-buttons" id="panel-buttons"></div>
        </div> -->
    </div>

    <!-- Модульная архитектура игры -->
    <script src="src/modules/hexGrid.js"></script>
    <script src="src/modules/buildings.js"></script>
    <script src="src/modules/gridRenderer.js"></script>
    <script src="src/modules/userManager.js"></script>
    <script src="src/modules/game.js"></script>
</body>
</html>
